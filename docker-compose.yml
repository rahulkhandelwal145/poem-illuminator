services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HF_TOKEN: ${VITE_HF_TOKEN:-}
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
    ports:
      - "8080:80"
    environment:
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
      CF_TOKEN: ${CF_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
