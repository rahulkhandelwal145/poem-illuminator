services:
  sd-server:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - hf-cache:/root/.cache/huggingface
    expose:
      - "8083"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HF_TOKEN: ${VITE_HF_TOKEN:-}
    ports:
      - "8080:80"
    depends_on:
      - sd-server

volumes:
  hf-cache:
