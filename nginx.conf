server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS — defers resolution so nginx starts even
    # when sd-server isn't running
    resolver 127.0.0.11 valid=30s;

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /local-generate → sd-server container (same Docker network)
    # set $upstream defers DNS resolution so nginx starts even if sd-server is still loading
    location /local-generate {
        set $upstream http://sd-server:8083/generate;
        proxy_pass $upstream;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 300s;
    }
}
